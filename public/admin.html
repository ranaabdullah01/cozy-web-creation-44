<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin · AK Real Estate</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .admin{max-width:720px;margin:0 auto;padding:60px 20px}
    .admin h1{font-family:var(--font-serif);font-size:32px;margin:0 0 8px}
    .admin p.hint{color:var(--muted);margin:0 0 32px}
    .field{display:block;margin-bottom:16px}
    .field label{display:block;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
    .field input,.field select,.field textarea{width:100%;padding:12px 14px;background:var(--panel);border:1px solid rgba(255,255,255,.1);color:var(--ink);border-radius:10px;font-family:inherit;font-size:15px}
    .field input:focus{outline:0;border-color:var(--gold)}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .msg{margin-top:16px;padding:12px 14px;border-radius:10px;font-size:14px}
    .msg.ok{background:rgba(80,180,120,.15);color:#8ee0a3}
    .msg.err{background:rgba(220,80,80,.15);color:#f4a1a1}
    hr{border:0;border-top:1px solid rgba(255,255,255,.08);margin:32px 0}
  </style>
</head>
<body>
  <header class="nav"><div class="container nav-inner"><a href="/" class="brand">AK<span> REAL ESTATE</span></a><span style="color:var(--muted);font-size:13px">Admin</span></div></header>

  <div class="admin">
    <h1>Add a Property</h1>
    <p class="hint">Requires your admin token (set as <code>ADMIN_TOKEN</code> in Cloudflare Pages env).</p>

    <div class="field">
      <label>Admin Token</label>
      <input id="token" type="password" placeholder="paste token" />
    </div>

    <hr />

    <h2 style="font-family:var(--font-serif);font-weight:500">1. Upload Image (optional)</h2>
    <div class="field">
      <label>Image file</label>
      <input id="file" type="file" accept="image/*" />
    </div>
    <button class="btn btn-ghost" onclick="upload()">Upload to R2</button>
    <div class="field" style="margin-top:14px">
      <label>Image key (auto-filled after upload)</label>
      <input id="image_key" placeholder="uploads/…" />
    </div>

    <hr />

    <h2 style="font-family:var(--font-serif);font-weight:500">2. Property Details</h2>
    <div class="field"><label>Title</label><input id="title" placeholder="Palm Signature Villa" /></div>
    <div class="row">
      <div class="field"><label>Price (AED)</label><input id="price" type="number" placeholder="24500000" /></div>
      <div class="field"><label>Community</label><input id="community" placeholder="Palm Jumeirah" /></div>
    </div>
    <div class="row">
      <div class="field"><label>Beds</label><input id="beds" type="number" /></div>
      <div class="field"><label>Baths</label><input id="baths" type="number" /></div>
    </div>
    <div class="row">
      <div class="field"><label>Area (sqft)</label><input id="area" type="number" /></div>
      <div class="field"><label>Type</label>
        <select id="type">
          <option value="Villa">Villa</option>
          <option value="Penthouse">Penthouse</option>
          <option value="Apartment">Apartment</option>
          <option value="Townhouse">Townhouse</option>
        </select>
      </div>
    </div>

    <button class="btn btn-gold" onclick="save()">Save Property</button>
    <div id="msg"></div>
  </div>

<script>
const $ = (id) => document.getElementById(id);
const msg = (t, cls) => { $("msg").className = "msg " + cls; $("msg").textContent = t; };

async function upload(){
  const f = $("file").files[0];
  if (!f) return msg("Choose a file first", "err");
  const fd = new FormData(); fd.append("file", f);
  const res = await fetch("/api/upload", { method:"POST", headers:{ "x-admin-token": $("token").value }, body: fd });
  if (!res.ok) return msg("Upload failed: " + await res.text(), "err");
  const j = await res.json();
  $("image_key").value = j.key;
  msg("Uploaded ✓  key=" + j.key, "ok");
}

async function save(){
  const body = {
    title: $("title").value,
    price: Number($("price").value),
    community: $("community").value,
    beds: Number($("beds").value) || null,
    baths: Number($("baths").value) || null,
    area: Number($("area").value) || null,
    type: $("type").value,
    image_key: $("image_key").value || null,
  };
  const res = await fetch("/api/listings", {
    method:"POST",
    headers:{ "content-type":"application/json", "x-admin-token": $("token").value },
    body: JSON.stringify(body),
  });
  if (!res.ok) return msg("Save failed: " + await res.text(), "err");
  msg("Saved ✓", "ok");
  ["title","price","community","beds","baths","area","image_key"].forEach(i=>$(i).value="");
}
</script>
</body>
</html>
