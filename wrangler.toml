name = "ak-realestate"
pages_build_output_dir = "public"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Replace with your D1 database ID from `wrangler d1 list`
[[d1_databases]]
binding = "DB"
database_name = "ak-realestate"
database_id = "YOUR_D1_DATABASE_ID"

# Replace with your R2 bucket name
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "ak-realestate-media"

# ADMIN_TOKEN is set in Cloudflare Pages → Settings → Variables (encrypted).
